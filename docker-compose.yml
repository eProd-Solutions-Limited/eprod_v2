version: '3'

services:
  payload:
    image: node:20-alpine
    ports:
      - '3000:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app/
    command: sh -c "corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm dev"
    depends_on:
      - mongo
      - mailhog
    env_file:
      - .env
    environment:
      SMTP_HOST: mailhog
      SMTP_PORT: 1025

  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    command:
      - --storageEngine=wiredTiger
    volumes:
      - data:/data/db
    logging:
      driver: none

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - '1025:1025'  # SMTP port
      - '8025:8025'  # Web UI (http://localhost:8025)
    logging:
      driver: none

volumes:
  data:
  node_modules: